# ~ / .config / hypr / hypridle.conf

general {
    lock_cmd = sh -c 'quickshell ipc --path "${XDG_CONFIG_HOME:-$HOME/.config}/shells" call lockScreen lock'
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 1800
    on-timeout = sh -c 'quickshell ipc --path "${XDG_CONFIG_HOME:-$HOME/.config}/shells" call lockScreen lock'
}
